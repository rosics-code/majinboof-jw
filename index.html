<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majinboof Archive</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Helvetica, Arial, sans-serif; margin: 0; padding: 40px; }
        header { border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 40px; }
        h1 { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .art-card { border: 1px solid #1a1a1a; background: #000; text-decoration: none; display: block; transition: border-color 0.2s; }
        .art-card:hover { border-color: #fff; }
        .art-card img { width: 100%; display: block; border-bottom: 1px solid #1a1a1a; }
        .info { padding: 15px; font-size: 11px; display: flex; justify-content: space-between; text-transform: uppercase; color: #888; }
        .title { color: #fff; font-weight: bold; }
        #error-container { display: none; text-align: center; margin-top: 100px; color: #ff0000; letter-spacing: 4px; }
        footer { margin-top: 60px; border-top: 1px solid #222; padding-top: 20px; text-align: center; }
        .disclaimer { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <header><h1>Majinboof / Archive / 999</h1></header>
    <div id="gallery"></div>
    <div id="error-container">ERROR_CODE: ASSET_FAILURE</div>
    <footer><div class="disclaimer">This site is not owned by or affiliated with Majinboof.</div></footer>

    <script>
        fetch('./artwork/artwork.json')
            .then(res => res.json())
            .then(data => {
                const gallery = document.getElementById('gallery');
                data.forEach(item => {
                    const card = document.createElement('a');
                    card.className = 'art-card';
                    
                    const rawData = JSON.stringify({
                        t: item.title,
                        f: item.filename,
                        s: item.status,
                        d: item.description,
                        rd: item.release_date,
                        sd: item.surface_date
                    });
                    
                    const code = btoa(unescape(encodeURIComponent(rawData)));
                    card.href = `art.html?v=${code}`;
                    
                    card.innerHTML = `
                        <img src="./artwork/${item.filename}">
                        <div class="info">
                            <span class="title">${item.title}</span>
                            <span>${item.status}</span>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            })
            .catch(() => document.getElementById('error-container').style.display = 'block');
    </script>
</body>
</html>
