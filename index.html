<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majinboof x Juice Archive</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica', Arial, sans-serif;
            margin: 0;
            padding: 40px;
        }

        header {
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        h1 { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }

        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .art-card {
            border: 1px solid #1a1a1a;
            background: #000;
        }

        .art-card img {
            width: 100%;
            display: block;
            border-bottom: 1px solid #1a1a1a;
        }

        .info {
            padding: 15px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
            color: #888;
        }

        .title { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>Majinboof / Archive / 999</h1>
    </header>

    <div id="gallery">
        </div>

    <script>
        // Fetch the JSON from the artwork folder
        fetch('artwork/artwork.json')
            .then(response => response.json())
            .then(data => {
                const gallery = document.getElementById('gallery');
                
                data.forEach(item => {
                    // This is your template
                    const card = `
                        <div class="art-card">
                            <img src="artwork/${item.filename}" alt="${item.title}">
                            <div class="info">
                                <span class="title">${item.title}</span>
                                <span class="status">${item.status}</span>
                            </div>
                        </div>
                    `;
                    gallery.innerHTML += card;
                });
            })
            .catch(err => console.error("Check your JSON file path!", err));
    </script>

</body>
</html>
