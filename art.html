<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Detail</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica', Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            display: flex;
            width: 100%;
            max-width: 1100px;
            gap: 60px;
            align-items: flex-start;
        }
        .left {
            flex: 1.2;
        }
        .left img {
            width: 100%;
            border: 1px solid #1a1a1a;
            display: block;
        }
        .right {
            flex: 1;
            padding-top: 20px;
        }
        h1 {
            font-size: 2rem;
            text-transform: uppercase;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }
        .status-tag {
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.7rem;
            margin-bottom: 15px;
            display: block;
        }
        .description {
            color: #555;
            line-height: 1.6;
            font-size: 0.9rem;
            margin-bottom: 40px;
        }
        .back-btn {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            border: 1px solid #333;
            padding: 12px 24px;
            letter-spacing: 1px;
            transition: border-color 0.2s;
        }
        .back-btn:hover {
            border-color: #fff;
        }
        #error-view {
            display: none;
            text-align: center;
        }
        .error-code {
            color: #ff0000;
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                gap: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="main-view">
        <div class="left">
            <img id="art-image" src="" alt="">
        </div>
        <div class="right">
            <span class="status-tag" id="art-status"></span>
            <h1 id="art-title"></h1>
            <p class="description">Majinboof x Juice WRLD Official Archive Entry. Part of the 999 visual legacy.</p>
            <a href="index.html" class="back-btn">Return to Archive</a>
        </div>
    </div>

    <div id="error-view">
        <div class="error-code">ERROR_CODE: DATA_INVALID</div>
        <a href="index.html" class="back-btn">Return Home</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title');
        const file = params.get('file');
        const status = params.get('status');

        if (title && file && status) {
            document.getElementById('art-title').innerText = title;
            document.getElementById('art-status').innerText = status;
            document.getElementById('art-image').src = `./artwork/${file}`;
            document.title = `${title} | Archive`;
        } else {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('error-view').style.display = 'block';
        }
    </script>
</body>
</html>
